# recamera-lite edge config — sourced by S99recamera-lite at boot.
# Copy to /userdata/recamera-lite.conf on the device and edit. No secrets here.

# Where to send salience events: the GPU server's host:port (UDP).
SERVER=192.168.1.10:23906

# Camera name reported in every event + used for the gated-frame URL (/vis/<NAME>.jpg).
# "auto" derives it from the detected sensor (GC2053->recamera-hq, OV5647->recamera).
CAM_NAME=auto

# On-device NPU model (INT8 .cvimodel). See ../model-build to build your own.
MODEL=/userdata/Models/yolo11n_ours.cvimodel

# Salience confidence threshold (0..1) and the threat-FPS cap (idle stays at ~2fps floor).
SALCONF=0.35
FPSMAX=15

# Extra flags passed verbatim to `vision` (e.g. "-h265", "-p 8554", "-jpegq 80").
EXTRA=
